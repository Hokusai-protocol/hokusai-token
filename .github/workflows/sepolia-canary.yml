name: Sepolia Canary

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sepolia-canary
  cancel-in-progress: false

jobs:
  sepolia-write-canary:
    runs-on: ubuntu-latest
    env:
      SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      KMS_DEPLOYER_KEY_ID: ${{ secrets.KMS_DEPLOYER_KEY_ID }}
      KMS_DEPLOYER_EXPECTED_ADDRESS: ${{ vars.KMS_DEPLOYER_EXPECTED_ADDRESS }}
      KMS_BACKEND_KEY_ID: ${{ secrets.KMS_BACKEND_KEY_ID }}
      KMS_BACKEND_EXPECTED_ADDRESS: ${{ vars.KMS_BACKEND_EXPECTED_ADDRESS }}
      E2E_DEPLOYMENT_FILE: ${{ vars.E2E_DEPLOYMENT_FILE || 'deployments/sepolia-latest.json' }}
      # HOK-2223: target the dedicated canary model (930), NOT production model 30 —
      # so canary mints can never advance the live Model 30 reward lineage (the
      # synthetic-drift root cause). Model 930 has its own token + genesis + budget.
      E2E_MODEL_ID: "930"
      SEPOLIA_E2E_WRITE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm ci
        working-directory: services/contract-deployer

      - run: npm run build
        working-directory: services/contract-deployer

      - run: npx hardhat compile

      - run: npx hardhat test test/e2e/sepolia-end-to-end.test.js --network sepolia

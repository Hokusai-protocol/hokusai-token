name: CI

# Blocking pre-mainnet test gate (HOK-2100). Runs the Hardhat contract suite and the
# contract-deployer consumer suite (typecheck + build + jest) on every PR and push to main.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Hardhat contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npx hardhat compile

      - run: npx hardhat test

  contract-deployer:
    name: Contract-deployer service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/contract-deployer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/contract-deployer/package-lock.json

      - run: npm ci

      # ESLint over src + tests (errors block; the type-aware/async debt is tracked as
      # warnings in HOK-2102 and does not fail the build).
      - name: Lint
        run: npm run lint

      # Production source must type-check (was ~90 errors before HOK-2100).
      - name: Typecheck
        run: npm run typecheck

      # Compile to dist/ — the same build the Docker image now runs.
      - name: Build
        run: npm run build

      # Compile the root Hardhat contracts so the ABI-sync guard strictly compares the vendored
      # consumer ABI against the freshly compiled artifact (no silent skip) — this is what catches
      # a stale vendored ABI such as the missing-deadline regression (HOK-2170).
      - name: Compile contracts (root) for ABI-sync strict comparison
        working-directory: ${{ github.workspace }}
        run: npm ci && npx hardhat compile

      # Unit + integration suites (mint-path conformance, consumer, schemas, etc.).
      - name: Test
        run: npm test -- --ci

  conformance:
    name: Cross-repo conformance (Gate 6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Install contract-deployer deps
        run: npm ci
        working-directory: services/contract-deployer

      - name: Check known-answer freshness
        run: node scripts/generate-mint-request-known-answer.js --check

      - name: Compile contracts
        run: npx hardhat compile

      - name: Hardhat conformance (assertions A + C)
        run: npx hardhat test test/conformance/golden-fixture.test.js

      - name: Consumer parity (assertions A + B)
        run: npm test -- --ci --testPathPattern='golden-fixture-parity'
        working-directory: services/contract-deployer

  launch-posture:
    name: Launch posture (Gate 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npx hardhat compile

      - run: npx hardhat test test/scripts/launchPosture.test.js

      - run: npx hardhat test test/e2e/launch-posture-mainnet-fork.test.js

name: Echidna

on:
  pull_request:
    branches:
      - main
    # Fuzz properties are over the Solidity state machines; off-chain-only PRs
    # can't violate them. push-to-main below stays UNFILTERED on purpose, so
    # every merge still gets one fuzz run (catches contract-affecting changes
    # these paths miss, e.g. an OpenZeppelin bump via the lockfile only).
    paths:
      - "contracts/**"
      - "echidna.config.yaml"
      - "hardhat.config.js"
      - ".github/workflows/echidna.yml"
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz-short:
    name: Fuzz Short
    runs-on: ubuntu-latest
    # 17 harnesses now (added vesting/escrow/funding/router/timelock for security review H-6).
    # The old 35-min budget fit the original 12 and timed out on the larger suite; 75 leaves
    # margin while staying well under fuzz-long's 120.
    timeout-minutes: 75

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Echidna image
        run: docker pull --platform linux/amd64 ghcr.io/crytic/echidna/echidna:v2.2.4

      - name: Run short fuzz suite
        run: npm run echidna:all

  fuzz-long:
    name: Fuzz Long (${{ matrix.harness }})
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      # One harness per job so the 5M testLimit (~90-120 min each) runs in parallel instead of
      # serially blowing the job timeout. 14 harnesses = 14 parallel jobs.
      matrix:
        harness:
          - EchidnaSanity
          - EchidnaHokusaiToken
          - EchidnaTokenManager
          - EchidnaAMMReserve
          - EchidnaAMMPhase
          - EchidnaAMMEconomic
          - EchidnaInfrastructureReserve
          - EchidnaDeltaVerifier
          - EchidnaDeltaVerifierMultiAttester
          - EchidnaRewardVestingVault
          - EchidnaPendingClaimsEscrow
          - EchidnaFundingVault
          - EchidnaUsageFeeRouter
          - EchidnaTimelockController

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Echidna image
        run: docker pull --platform linux/amd64 ghcr.io/crytic/echidna/echidna:v2.2.4

      - name: Build long-run config
        run: |
          cp echidna.config.yaml echidna.long.config.yaml
          perl -0pi -e 's/testLimit: 50000/testLimit: 5000000/' echidna.long.config.yaml

      - name: Compile
        # crytic-compile inside the echidna image has no npx/node, so pre-build hardhat artifacts
        # here (otherwise it fails "Cannot execute npx").
        run: npx hardhat compile

      - name: Run 5M fuzz — ${{ matrix.harness }}
        run: |
          rm -rf echidna-corpus
          docker run --rm --platform linux/amd64 --user "$(id -u):$(id -g)" -e HOME=/tmp -v "$PWD:/code" -w /code ghcr.io/crytic/echidna/echidna:v2.2.4 \
            echidna . --contract "${{ matrix.harness }}" --config echidna.long.config.yaml

      - name: Upload corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: echidna-corpus-${{ matrix.harness }}
          path: |
            echidna-corpus
            echidna.long.config.yaml
